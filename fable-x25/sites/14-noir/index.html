<style>
:root{
  --amber:#ffb84d;
  --paper:#e9e5db;
  --ash:#9a958a;
  --ink:#0a0a0a;
  --oswald:'Oswald',sans-serif;
  --type:'Special Elite',monospace;
  --courier:'Courier Prime',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:#000;color:var(--paper);
  font-family:var(--type);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--amber);color:#000}
:focus-visible{outline:2px solid var(--amber);outline-offset:3px}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}

/* ---------- FILM LAYER ---------- */
#film{position:fixed;inset:0;z-index:0;background:#000}
.shot{position:absolute;inset:0;overflow:hidden}
.kb{position:absolute;inset:-6%;will-change:transform}
.kb img{width:100%;height:100%;object-fit:cover;display:block}
/* monochrome grades — one image, many scenes */
.g-base .kb img{filter:grayscale(1) contrast(1.06) brightness(.96)}
.g-hard .kb img{filter:grayscale(1) contrast(1.32) brightness(.88)}
.g-soft .kb img{filter:grayscale(1) contrast(.94) brightness(1.1)}
.g-dark .kb img{filter:grayscale(1) contrast(1.2) brightness(.72)}
.g-noir .kb img{filter:grayscale(1) contrast(1.48) brightness(.6)}
.g-title .kb img{filter:grayscale(1) contrast(1.35) brightness(.42)}
.shot .scrim{position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(0,0,0,.42) 0%,rgba(0,0,0,0) 26%,rgba(0,0,0,0) 44%,rgba(0,0,0,.62) 72%,rgba(0,0,0,.94) 100%)}
.shot .scrim-l{position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(90deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,0) 55%)}

/* ---------- OVERLAYS ---------- */
#grain{position:fixed;inset:0;width:100%;height:100%;z-index:6;pointer-events:none;opacity:.11}
#vignette{position:fixed;inset:0;z-index:5;pointer-events:none;
  background:radial-gradient(ellipse at 50% 46%,rgba(0,0,0,0) 52%,rgba(0,0,0,.5) 100%)}
#flicker{position:fixed;inset:0;z-index:7;pointer-events:none;background:#fff;opacity:0}
#cut{position:fixed;inset:0;z-index:30;background:#000;opacity:1;pointer-events:none;transition:opacity .7s ease}
#cut.snap{transition:opacity .06s linear}

/* ---------- HUD ---------- */
#back{position:fixed;top:18px;left:20px;z-index:20;text-decoration:none;color:var(--ash);
  font-family:var(--courier);font-size:11px;letter-spacing:.32em;padding:6px 2px;transition:color .3s}
#back:hover{color:var(--amber)}
#rainbtn{position:fixed;top:14px;right:18px;z-index:20;display:flex;align-items:center;gap:9px;
  font-family:var(--courier);font-size:10px;letter-spacing:.3em;color:var(--ash);
  padding:8px 10px;border:1px solid rgba(233,229,219,.16);transition:color .3s,border-color .3s}
#rainbtn:hover{color:var(--amber);border-color:rgba(255,184,77,.45)}
#rainbtn.on{color:var(--amber);border-color:rgba(255,184,77,.6)}
#rainbtn .bars{display:flex;align-items:flex-end;gap:2px;height:11px}
#rainbtn .bars i{width:2px;height:3px;background:currentColor;transition:height .2s}
#rainbtn.on .bars i{animation:bar 1s ease-in-out infinite}
#rainbtn.on .bars i:nth-child(2){animation-delay:.22s}
#rainbtn.on .bars i:nth-child(3){animation-delay:.44s}
@keyframes bar{0%,100%{height:3px}50%{height:11px}}

#counter{position:fixed;bottom:18px;left:20px;z-index:20;font-family:var(--courier);
  font-size:11px;letter-spacing:.26em;color:var(--ash);display:flex;align-items:center;gap:12px;user-select:none}
#counter .dot{width:7px;height:7px;border-radius:50%;border:1px solid var(--ash);position:relative}
#counter .dot::after{content:'';position:absolute;inset:2px;border-radius:50%;background:var(--ash);opacity:.7}

/* evidence drawer */
#evtab{position:fixed;bottom:18px;right:18px;z-index:22;font-family:var(--courier);font-size:10px;
  letter-spacing:.28em;color:var(--ash);padding:9px 14px;border:1px solid rgba(233,229,219,.16);
  background:rgba(0,0,0,.5);transition:color .3s,border-color .3s}
#evtab:hover,#evtab.pulse{color:var(--amber);border-color:rgba(255,184,77,.5)}
#evtab b{color:inherit;font-weight:700}
#drawer{position:fixed;top:0;right:0;bottom:0;width:min(360px,88vw);z-index:25;
  background:rgba(8,8,8,.96);border-left:1px solid rgba(233,229,219,.14);
  transform:translateX(102%);transition:transform .45s cubic-bezier(.22,.9,.24,1);
  padding:64px 26px 26px;overflow-y:auto}
#drawer.open{transform:translateX(0)}
#drawer h2{font-family:var(--courier);font-weight:700;font-size:12px;letter-spacing:.34em;color:var(--paper);
  border-bottom:1px dashed rgba(233,229,219,.25);padding-bottom:12px;margin-bottom:6px}
#drawer .sub{font-family:var(--courier);font-size:10px;letter-spacing:.2em;color:var(--ash);margin-bottom:20px}
#drawer::-webkit-scrollbar{width:8px}
#drawer::-webkit-scrollbar-thumb{background:#2a2a28}
.clue{border:1px solid rgba(233,229,219,.18);padding:12px 14px;margin-bottom:12px;position:relative;
  animation:clueIn .5s ease both}
@keyframes clueIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}
.clue .tag{font-family:var(--courier);font-size:9px;letter-spacing:.3em;color:var(--ash);
  border:1px solid rgba(233,229,219,.3);display:inline-block;padding:2px 7px;margin-bottom:8px}
.clue .name{font-family:var(--type);font-size:13px;line-height:1.5;color:var(--paper)}
.clue::before{content:'';position:absolute;top:-1px;left:-1px;width:14px;height:14px;
  border-top:3px solid rgba(233,229,219,.35);border-left:3px solid rgba(233,229,219,.35)}
#drawer .empty{font-family:var(--type);font-size:13px;color:var(--ash);line-height:1.7}
#dclose{position:absolute;top:18px;right:18px;font-family:var(--courier);font-size:10px;
  letter-spacing:.28em;color:var(--ash);padding:7px 10px;border:1px solid rgba(233,229,219,.16)}
#dclose:hover{color:var(--amber);border-color:rgba(255,184,77,.5)}

/* ---------- STAGE ---------- */
#stage{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;pointer-events:none}
#stage>*{pointer-events:auto}

/* title card */
#title{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:24px}
.tc-file{font-family:var(--courier);font-size:clamp(10px,1.1vw,12px);letter-spacing:.5em;color:var(--ash);
  margin-bottom:26px;text-shadow:0 1px 5px rgba(0,0,0,.9);animation:riseIn 1.2s .3s cubic-bezier(.16,1,.3,1) both}
.tc-title{font-family:var(--oswald);font-weight:700;text-transform:uppercase;
  font-size:clamp(58px,11.5vw,168px);line-height:.92;letter-spacing:.045em;color:var(--paper);
  text-shadow:0 2px 0 rgba(0,0,0,.8),0 0 46px rgba(0,0,0,.65);
  animation:titleIn 1.6s .55s cubic-bezier(.16,1,.3,1) both}
.tc-title .rough{filter:url(#erode)}
.tc-rule{width:min(320px,52vw);height:1px;background:linear-gradient(90deg,transparent,var(--ash),transparent);
  margin:30px 0 18px;animation:riseIn 1.2s 1.1s cubic-bezier(.16,1,.3,1) both}
.tc-sub{font-family:var(--oswald);font-weight:500;font-size:clamp(12px,1.5vw,17px);letter-spacing:.58em;
  text-indent:.58em;color:var(--paper);text-transform:uppercase;text-shadow:0 1px 6px rgba(0,0,0,.9);
  animation:riseIn 1.2s 1.25s cubic-bezier(.16,1,.3,1) both}
.tc-tag{font-family:var(--type);font-size:clamp(13px,1.5vw,16px);color:var(--ash);margin-top:34px;
  min-height:1.6em;letter-spacing:.04em}
.tc-tag .caret{display:inline-block;width:9px;height:1.05em;background:var(--ash);vertical-align:-.18em;
  margin-left:2px;animation:blink 1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
@keyframes riseIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
@keyframes titleIn{from{opacity:0;letter-spacing:.14em;transform:translateY(10px)}to{opacity:1;letter-spacing:.045em;transform:none}}

.stamp{font-family:var(--oswald);font-weight:600;text-transform:uppercase;letter-spacing:.24em;text-indent:.24em;
  color:var(--amber);border:2px solid var(--amber);position:relative;
  padding:15px 30px;font-size:clamp(13px,1.4vw,16px);background:rgba(0,0,0,.45);
  transform:rotate(-1.6deg);transition:background .22s,color .22s,transform .22s;box-shadow:0 0 0 rgba(255,184,77,0)}
.stamp::after{content:'';position:absolute;inset:4px;border:1px solid rgba(255,184,77,.55);pointer-events:none;
  transition:border-color .22s}
.stamp:hover{background:var(--amber);color:#000;transform:rotate(0deg) translateY(1px)}
.stamp:hover::after{border-color:rgba(0,0,0,.55)}
#openfile{margin-top:44px;animation:riseIn 1.2s 3.4s cubic-bezier(.16,1,.3,1) both}

/* scene narration */
#scene{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;
  padding:0 clamp(20px,6vw,96px) clamp(74px,10vh,96px)}
.slug{font-family:var(--courier);font-size:clamp(10px,1.05vw,12px);letter-spacing:.34em;color:var(--ash);
  margin-bottom:18px;opacity:0;animation:riseIn .8s .15s ease both}
.slug b{color:var(--paper);font-weight:700}
.prose{max-width:640px;font-size:clamp(14.5px,1.55vw,18px);line-height:1.85;color:var(--paper);
  text-shadow:0 1px 3px rgba(0,0,0,.9),0 0 18px rgba(0,0,0,.6)}
.prose .line{opacity:0;display:inline}
.prose .line.show{animation:lineIn .7s ease both}
@keyframes lineIn{from{opacity:0}to{opacity:1}}
.decide{margin-top:30px;opacity:0;transform:translateY(14px);transition:opacity .7s ease,transform .7s cubic-bezier(.16,1,.3,1)}
.decide.show{opacity:1;transform:none}
.decide .dlabel{font-family:var(--courier);font-size:10px;letter-spacing:.34em;color:var(--ash);margin-bottom:14px}
.choices{display:flex;gap:22px;flex-wrap:wrap}
.choices .stamp:nth-child(2){transform:rotate(1.3deg)}
.choices .stamp:nth-child(2):hover{transform:rotate(0deg) translateY(1px)}
.instant .slug,.instant .decide{opacity:1;transform:none;animation:none}
.instant .prose .line{opacity:1;animation:none}

/* ending card */
#ending{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:24px;overflow-y:auto}
#ending::-webkit-scrollbar{width:0}
.end-bureau{font-family:var(--courier);font-size:10px;letter-spacing:.44em;color:var(--ash);margin-bottom:34px;
  text-shadow:0 1px 5px rgba(0,0,0,.9);animation:riseIn 1s .2s ease both}
.end-stampbox{border:3px solid var(--paper);padding:22px 44px;position:relative;transform:rotate(-2.2deg);
  animation:stampDown .55s .6s cubic-bezier(.34,1.56,.64,1) both;background:rgba(0,0,0,.4)}
.end-stampbox::after{content:'';position:absolute;inset:6px;border:1px solid rgba(233,229,219,.6)}
.end-stampbox h2{font-family:var(--oswald);font-weight:700;text-transform:uppercase;
  font-size:clamp(38px,7vw,84px);line-height:1;letter-spacing:.1em;color:var(--paper)}
@keyframes stampDown{from{opacity:0;transform:rotate(-2.2deg) scale(1.7)}to{opacity:1;transform:rotate(-2.2deg) scale(1)}}
.end-verdict{font-family:var(--courier);font-weight:700;font-size:clamp(12px,1.6vw,15px);letter-spacing:.4em;
  color:var(--paper);margin-top:30px;animation:riseIn 1s 1.05s ease both}
.end-line{font-family:var(--type);font-size:clamp(13px,1.5vw,16px);color:var(--ash);max-width:520px;
  line-height:1.9;margin-top:16px;animation:riseIn 1s 1.25s ease both}
.end-path{margin-top:40px;animation:riseIn 1s 1.5s ease both;max-width:760px}
.end-path .plabel{font-family:var(--courier);font-size:10px;letter-spacing:.36em;color:rgba(233,229,219,.72);
  margin-bottom:16px;text-shadow:0 1px 4px rgba(0,0,0,.85)}
.pstamps{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.pstamp{font-family:var(--oswald);font-weight:600;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(233,229,219,.85);background:rgba(0,0,0,.55);border:1px solid rgba(233,229,219,.5);
  padding:7px 13px;transform:rotate(-1.2deg);text-shadow:0 1px 3px rgba(0,0,0,.9)}
.pstamp:nth-child(even){transform:rotate(1.1deg)}
.pstamp .n{color:rgba(233,229,219,.65);margin-right:7px}
#restart{margin-top:44px;animation:riseIn 1s 1.8s ease both}

/* responsive */
@media (max-width:640px){
  #scene{padding:0 20px 108px}
  .prose{font-size:14px;line-height:1.75}
  .choices{gap:12px}
  .stamp{padding:13px 20px;font-size:12px}
  #counter{bottom:16px;left:16px;font-size:9.5px;letter-spacing:.2em}
  #evtab{bottom:56px;right:16px}
  #back{top:14px;left:16px}
  #rainbtn{top:10px;right:12px}
  .end-stampbox{padding:16px 26px}
  .tc-tag{padding:0 8px}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001s!important;animation-delay:0s!important;transition-duration:.001s!important}
}
</style>
</head>

<script>
'use strict';
/* ============ THE LONG SLEEP — story graph ============ */
const A='assets/';
const IMGS={street:A+'street.jpg',office:A+'office.jpg',fatale:A+'fatale.jpg',pier:A+'pier.jpg',hotel:A+'hotel.jpg'};

const NODES={
n1:{img:'office',grade:'g-base',reel:'REEL 1 · SC. 01',slug:'INT. McALLISTER INVESTIGATIONS — MIDNIGHT',
  kb:{o:'42% 62%',s0:1.05,s1:1.16,x:-1.5,y:-1},
  prose:"Three days of rain and the city still wouldn't come clean. I was alone with the Quint file — case 247, a year cold, a drowned man nobody mourned and a coroner who signed his name too fast. The bottle was down to its last honest inch when the phone rang. A woman's voice, low, like smoke settling. “Mr. McAllister. Eddie Quint didn't drown. Be at the Roxy on Fifth in an hour. Come alone, or don't come at all.” The line died before I could ask her name. They always hang up before the important part.",
  choices:[{label:'Take the bait',to:'n2'},{label:'Work the file',to:'n3'}]},

n2:{img:'street',grade:'g-base',reel:'REEL 1 · SC. 02',slug:'EXT. FIFTH STREET — NIGHT — RAIN',
  kb:{o:'62% 55%',s0:1.06,s1:1.2,x:2,y:-1},
  clue:'Matchbook — HOTEL CARLTON, Rm 9, in a hand that wanted to be found',
  prose:"Fifth Street at midnight is a church for people who've stopped praying. The rain came down slow and permanent, neon bleeding into the gutters like the whole block had been shot. Nobody at the Roxy but a Packard with its engine still ticking and a matchbook on the seat — HOTEL CARLTON, ROOM 9, written careful, meant to be found. Then I saw her, half a block down: a silhouette under the lamplight, watching me the way a cat watches a canary it hasn't decided about. She turned. She walked. She knew I'd follow.",
  choices:[{label:'Follow her',to:'n4'},{label:'Check the hotel',to:'n5'}]},

n3:{img:'office',grade:'g-hard',reel:'REEL 1 · SC. 02',slug:'INT. McALLISTER INVESTIGATIONS — LATER',
  kb:{o:'58% 78%',s0:1.1,s1:1.24,x:-2,y:1.5},
  clue:'Withdrawal slip — $10,000, drawn the day Quint died, initialed V.K.',
  prose:"I let the Roxy keep its secret and went back to the paper. Second read, page eleven, it had been there all along: a withdrawal slip, ten grand, dated the afternoon Eddie Quint went into the water — and a matching deposit that night to somebody signing V.K. Dead men don't move money. The coroner's report had been re-signed too, a week late, in fresher ink. I was still connecting dots when the hallway floor creaked. Soft. Deliberate. My door stood open. I never leave it open. Someone was standing in it.",
  choices:[{label:'Let her in',to:'n6'},{label:'Go to the pier',to:'n7'}]},

n4:{img:'fatale',grade:'g-soft',reel:'REEL 2 · SC. 03',slug:'EXT. ALAMEDA CORNER — FOG',
  kb:{o:'68% 30%',s0:1.12,s1:1.26,x:3,y:2},
  clue:'Brass room key, stamped "9" — still warm from her glove',
  prose:"I followed her to the corner of Alameda, where the fog rolls up off the river to forget things. She let me catch up — which meant the following had been her idea all along. “Vera Kessler,” she said, like the name cost her something. “Eddie was my husband. He paid ten thousand dollars to stop being anybody's business, and somebody made it permanent anyway.” She pressed a key into my hand, stamped with a nine, warm from her glove. “The Carlton. What's in that room gets men killed, Mr. McAllister. Try to be an exception.”",
  choices:[{label:'Trust her — take the key',to:'n5'},{label:'Press her',to:'n8'}]},

n5:{img:'hotel',grade:'g-base',reel:'REEL 2 · SC. 04',slug:'INT. HOTEL CARLTON, ROOM 9 — NIGHT',
  kb:{o:'34% 28%',s0:1.06,s1:1.22,x:-2,y:3},
  clue:"Falk's ledger — payouts to Dr. Lehmann, coroner, signed M.F.",
  prose:"The Carlton rented rooms by the hour and regrets by the week. Room 9 smelled of dust and gardenias — she'd been here first, or last, or both. Under a floorboard that complained too loud I found it: a ledger, neat as scripture, payouts to Dr. Lehmann the county coroner, every page signed M.F. Marty Falk. The man who owned the piers, the ponies, and apparently the official opinion on how Eddie Quint died. Then the phone rang in a room I'd told no one about. “You found it,” a man said, pleasant as a tax notice. “Santa Monica Pier. One hour. Come alone.”",
  choices:[{label:'Go to the pier alone',to:'n9'},{label:'Call Lt. Brody first',to:'n10'}]},

n6:{img:'fatale',grade:'g-base',reel:'REEL 2 · SC. 03',slug:'INT. OFFICE DOORWAY — NIGHT',
  kb:{o:'40% 26%',s0:1.05,s1:1.18,x:1.5,y:2.5},
  clue:'Gardenia perfume — it stayed in the office longer than she did',
  prose:"She stood in my doorway with the lamplight behind her, dressed in black like she was already in mourning for somebody. Maybe me. “Vera Kessler. You've been reading about my husband.” The story came out flat, rehearsed in mirrors: Eddie faked the drowning to shake loose of Marty Falk, and somebody had un-faked it. “There's a ledger in room 9 at the Carlton. It's why Eddie's dead. It's why they'll come for me next.” Her eyes were the only part of her that begged. Everything else stood there daring me to be smart instead.",
  choices:[{label:'Take the case',to:'n5'},{label:'Turn her away',to:'n11'}]},

n7:{img:'pier',grade:'g-soft',reel:'REEL 2 · SC. 04',slug:'EXT. SANTA MONICA PIER — 3 A.M.',

/* ============ state ============ */
const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
let state={node:null,path:[],clues:[]};
const $=s=>document.querySelector(s);
const film=$('#film'),stage=$('#stage'),cut=$('#cut'),ctext=$('#ctext');

/* ============ film layer (image + ken burns + grade) ============ */
function setShot(imgKey,grade,kb){
  const shot=document.createElement('div');
  shot.className='shot '+grade;
  const wrap=document.createElement('div');wrap.className='kb';
  const img=document.createElement('img');
  img.src=IMGS[imgKey];img.alt='';img.draggable=false;
  wrap.appendChild(img);
  const s1=document.createElement('div');s1.className='scrim';
  const s2=document.createElement('div');s2.className='scrim-l';
  shot.appendChild(wrap);shot.appendChild(s1);shot.appendChild(s2);
  film.replaceChildren(shot);
  if(kb){
    img.style.objectPosition=kb.o;
    wrap.style.transform=`scale(${kb.s0})`;
    wrap.style.transformOrigin=kb.o;
    if(!reduced){
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        wrap.style.transition='transform 38s cubic-bezier(.3,0,.7,1)';
        wrap.style.transform=`scale(${kb.s1}) translate(${kb.x}%,${kb.y}%)`;
      }));
    }
  }
}

/* ============ transitions: cut to black, hold, fade in ============ */
let transitioning=false;
function cutTo(fn){
  if(transitioning)return;transitioning=true;
  cut.classList.add('snap');cut.style.opacity='1';
  setTimeout(()=>{
    fn();
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      cut.classList.remove('snap');cut.style.opacity='0';
      setTimeout(()=>{transitioning=false;},700);
    }));
  },reduced?60:320);
}

/* ============ renderers ============ */
function sentences(t){return t.match(/[^.!?…”]*[.!?…”]+[””]?\s*/g)||[t];}

function renderTitle(){
  ctext.textContent='TITLE CARD';
  setShot('street','g-title',{o:'50% 60%',s0:1.04,s1:1.14,x:1,y:-1});
  stage.innerHTML=`
  <section id="title">
    <div class="tc-file">CASE FILE №247 · CONFIDENTIAL · McALLISTER INVESTIGATIONS</div>
    <h1 class="tc-title"><span class="rough">THE LONG SLEEP</span></h1>
    <div class="tc-rule"></div>
    <div class="tc-sub">A Case in Five Scenes</div>
    <p class="tc-tag" aria-label="The dead don't stay quiet in this town. They just wait for the rain."><span id="typed"></span><span class="caret"></span></p>
    <button class="stamp" id="openfile">Open the file</button>
  </section>`;
  const msg="The dead don't stay quiet in this town. They just wait for the rain.";
  const typed=$('#typed');
  if(reduced){typed.textContent=msg;}
  else{
    let i=0;
    const t=setInterval(()=>{
      if(document.hidden)return;
      typed.textContent=msg.slice(0,++i);
      if(i>=msg.length)clearInterval(t);
    },42);
    setTimeout(()=>{typed.textContent=msg;clearInterval(t);},msg.length*42+4000);
  }
  $('#openfile').addEventListener('click',()=>go('n1'));
}

function renderScene(id,instant){
  const n=NODES[id];
  ctext.textContent=n.reel.replace(/ /g,' ');
  setShot(n.img,n.grade,n.kb);
  const lines=sentences(n.prose);
  stage.innerHTML=`
  <section id="scene" class="${instant?'instant':''}">
    <div class="slug">${n.slug.replace('—','<b>—</b>')}</div>
    <p class="prose">${lines.map(l=>`<span class="line">${l}</span>`).join('')}</p>
    <div class="decide">
      <div class="dlabel">DECISION REQUIRED — FILE 247</div>
      <div class="choices">${n.choices.map((c,i)=>`<button class="stamp" data-to="${c.to}" data-label="${c.label}">${c.label}</button>`).join('')}</div>
    </div>
  </section>`;
  const lineEls=[...stage.querySelectorAll('.line')];
  const decide=stage.querySelector('.decide');
  if(instant||reduced){
    lineEls.forEach(el=>el.classList.add('show'));
    decide.classList.add('show');
  }else{
    lineEls.forEach((el,i)=>{el.style.animationDelay=(0.45+i*0.5)+'s';el.classList.add('show');});
    setTimeout(()=>decide.classList.add('show'),450+lineEls.length*500+350);
  }
  stage.querySelectorAll('.choices .stamp').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.path.push(btn.dataset.label);
      go(btn.dataset.to);
    });
  });
  if(n.clue&&!state.clues.includes(n.clue)){
    state.clues.push(n.clue);
    updateEvidence(true);
  }
}

function renderEnding(id){
  const n=NODES[id];
  ctext.textContent=n.reel.replace(/ /g,' ');
  setShot(n.img,'g-title',{o:'50% 50%',s0:1.12,s1:1.04,x:0,y:0});
  const steps=state.path.length?state.path:['(the file was never opened)'];
  stage.innerHTML=`
  <section id="ending">
    <div class="end-bureau">LOS ANGELES COUNTY · BUREAU OF RECORDS · FILE №247</div>
    <div class="end-stampbox"><h2>Case Closed</h2></div>
    <div class="end-verdict">${n.verdict}</div>
    <p class="end-line">${n.line}</p>
    <div class="end-path">
      <div class="plabel">YOUR PATH THROUGH THE LONG SLEEP — ${steps.length} DECISION${steps.length===1?'':'S'}</div>
      <div class="pstamps">${steps.map((s,i)=>`<span class="pstamp"><span class="n">${String(i+1).padStart(2,'0')}</span>${s}</span>`).join('')}</div>
    </div>
    <button class="stamp" id="restart">Restart — reopen the file</button>
  </section>`;
  $('#restart').addEventListener('click',()=>{
    state={node:null,path:[],clues:[]};
    updateEvidence(false);
    go('title');
  });
}

function go(id,instant){
  cutTo(()=>{
    state.node=id;
    if(id==='title')renderTitle();
    else if(NODES[id].ending)renderEnding(id);
    else renderScene(id,instant);
  });
}

/* ============ evidence drawer ============ */
const drawer=$('#drawer'),evtab=$('#evtab'),cluelist=$('#cluelist');
function updateEvidence(pulse){
  $('#evcount').textContent=String(state.clues.length).padStart(2,'0');
  cluelist.innerHTML=state.clues.length
    ?state.clues.map((c,i)=>`<div class="clue" style="animation-delay:${i*0.06}s"><span class="tag">EXHIBIT ${String.fromCharCode(65+i)}</span><div class="name">${c}</div></div>`).join('')
    :'<p class="empty">Nothing tagged yet. Evidence you turn up will be logged here, whether you like what it says or not.</p>';
  if(pulse){evtab.classList.add('pulse');setTimeout(()=>evtab.classList.remove('pulse'),1600);}
}
evtab.addEventListener('click',()=>{
  const open=drawer.classList.toggle('open');
  evtab.setAttribute('aria-expanded',open);
});
$('#dclose').addEventListener('click',()=>{drawer.classList.remove('open');evtab.setAttribute('aria-expanded','false');});

/* ============ film grain (canvas) + projector flicker ============ */
const grain=$('#grain'),gctx=grain.getContext('2d');
let gw,gh,gdata;
function sizeGrain(){
  gw=Math.max(2,Math.floor(innerWidth/4));gh=Math.max(2,Math.floor(innerHeight/4));
  grain.width=gw;grain.height=gh;
  gdata=gctx.createImageData(gw,gh);
}
sizeGrain();addEventListener('resize',sizeGrain);
let lastG=0,scratchX=-1,scratchLife=0;
function drawGrain(t){
  if(t-lastG>(reduced?1e9:80)){
    lastG=t;
    const d=gdata.data;
    for(let i=0;i<d.length;i+=4){
      const v=(Math.random()*255)|0;
      d[i]=v;d[i+1]=v;d[i+2]=v;d[i+3]=(Math.random()*46)|0;
    }
    gctx.putImageData(gdata,0,0);
    if(scratchLife>0){
      gctx.fillStyle='rgba(255,255,255,.24)';
      gctx.fillRect(scratchX,0,1,gh);scratchLife--;
    }else if(Math.random()<0.012){scratchX=(Math.random()*gw)|0;scratchLife=2+(Math.random()*3|0);}
  }
}
const flicker=$('#flicker');
let nextFlick=performance.now()+3000;
function doFlicker(t){
  if(reduced)return;
  if(t>nextFlick){
    flicker.style.opacity=(0.02+Math.random()*0.045).toFixed(3);
    setTimeout(()=>{flicker.style.opacity='0';},60+Math.random()*110);
    nextFlick=t+2600+Math.random()*6500;
  }
}
let rafId=null;
function loop(t){drawGrain(t);doFlicker(t);rafId=requestAnimationFrame(loop);}
function startLoop(){if(rafId==null)rafId=requestAnimationFrame(loop);}
function stopLoop(){if(rafId!=null){cancelAnimationFrame(rafId);rafId=null;}}
document.addEventListener('visibilitychange',()=>{document.hidden?stopLoop():startLoop();});
if(reduced){drawGrain(1e9+1);}else{startLoop();}

/* ============ rain — WebAudio filtered noise, OFF by default ============ */
let audio=null,rainGain=null,rainOn=false;
function buildRain(){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const len=ctx.sampleRate*2.5;
  const buf=ctx.createBuffer(1,len,ctx.sampleRate);
  const ch=buf.getChannelData(0);
  for(let i=0;i<len;i++)ch[i]=Math.random()*2-1;
  const master=ctx.createGain();master.gain.value=0;master.connect(ctx.destination);
  // hiss layer — rain on pavement
  const s1=ctx.createBufferSource();s1.buffer=buf;s1.loop=true;
  const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=900;
  const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=4200;lp.Q.value=.3;
  const g1=ctx.createGain();g1.gain.value=.55;
  s1.connect(hp);hp.connect(lp);lp.connect(g1);g1.connect(master);
  // body layer — low wash
  const s2=ctx.createBufferSource();s2.buffer=buf;s2.loop=true;s2.playbackRate.value=.72;
  const lp2=ctx.createBiquadFilter();lp2.type='lowpass';lp2.frequency.value=420;
  const g2=ctx.createGain();g2.gain.value=.5;
  s2.connect(lp2);lp2.connect(g2);g2.connect(master);
  // slow swell so it breathes
  const lfo=ctx.createOscillator();lfo.frequency.value=.13;
  const lg=ctx.createGain();lg.gain.value=.09;
  lfo.connect(lg);lg.connect(g1.gain);lfo.start();
  s1.start();s2.start();
  audio=ctx;rainGain=master;
}
const rainbtn=$('#rainbtn');
rainbtn.addEventListener('click',()=>{
  if(!audio)buildRain();
  if(audio.state==='suspended')audio.resume();
  rainOn=!rainOn;
  const t=audio.currentTime;
  rainGain.gain.cancelScheduledValues(t);
  rainGain.gain.setTargetAtTime(rainOn?0.16:0.0,t,rainOn?1.2:.4);
  rainbtn.classList.toggle('on',rainOn);
  rainbtn.setAttribute('aria-pressed',rainOn);
  rainbtn.querySelector('span:last-child').innerHTML=rainOn?'RAIN&nbsp;ON':'RAIN&nbsp;OFF';
});

/* ============ keyboard ============ */
addEventListener('keydown',e=>{
  if(e.key==='1'||e.key==='2'){
    const btns=stage.querySelectorAll('.choices .stamp');
    const b=btns[+e.key-1];if(b&&stage.querySelector('.decide.show'))b.click();
  }
  if(e.key==='Enter'&&$('#openfile'))$('#openfile').click();
  if(e.key==='Escape'){drawer.classList.remove('open');evtab.setAttribute('aria-expanded','false');}
});

/* ============ deep link (?node=n5 | ?node=3 | ?node=end-good) ============ */
function canonicalPathTo(target){
  // BFS from n1 through choice edges, returns [{id,label}...]
  const q=[['n1',[]]];const seen=new Set(['n1']);
  while(q.length){
    const [id,path]=q.shift();
    if(id===target)return path;
    const n=NODES[id];if(!n||n.ending)continue;
    for(const c of n.choices){
      if(!seen.has(c.to)){seen.add(c.to);q.push([c.to,[...path,{id:c.to,label:c.label,from:id}]]);}
    }
  }
  return null;
}
(function init(){
  const p=new URLSearchParams(location.search).get('node');
  let target=null;
  if(p){
    if(NODES[p])target=p;
    else if(NODES['n'+p])target='n'+p;
  }
  if(target&&target!=='n1'||target==='n1'){
    // seed path + clues along canonical route
    const route=canonicalPathTo(target);
    if(route!==null){
      const ids=['n1',...route.map(r=>r.id)];
      state.path=route.map(r=>r.label);
      for(const id of ids){const n=NODES[id];if(n&&n.clue&&!state.clues.includes(n.clue))state.clues.push(n.clue);}
      updateEvidence(false);
      state.node=target;
      if(NODES[target].ending)renderEnding(target);
      else renderScene(target,true);
      requestAnimationFrame(()=>requestAnimationFrame(()=>{cut.style.opacity='0';}));
      return;
    }
  }
  renderTitle();
  setTimeout(()=>{cut.style.opacity='0';},reduced?50:400);
})();
</script>
